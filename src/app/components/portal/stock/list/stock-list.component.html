<app-portal-actions>
  <app-portal-button icon="pi-download">
    Export
  </app-portal-button>

  <app-portal-button variant="primary" icon="pi-plus">
    New Movement
  </app-portal-button>
</app-portal-actions>

<app-portal-page-content>
  <app-portal-filter-bar layout="six">
      <app-portal-search-filter
        [value]="searchTerm()"
        placeholder="Search chemical, batch, or reference"
        (valueChange)="searchTerm.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedMovementType()"
        [options]="movementTypeOptions"
        (valueChange)="selectedMovementType.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedChemical()"
        [options]="chemicalOptions"
        (valueChange)="selectedChemical.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedLocation()"
        [options]="locationOptions"
        (valueChange)="selectedLocation.set($event); first.set(0)"
      />

      <app-portal-date-filter [label]="selectedDateRange()" />

      <app-portal-button icon="pi-refresh" [full]="true" (buttonClick)="resetFilters()">
        Reset
      </app-portal-button>
  </app-portal-filter-bar>

  <app-portal-data-table [config]="tableConfig()">
      <ng-template portalDataTableBody let-movement>
        <tr>
          <td class="text-sm text-slate-700">{{ movement.movementId }}</td>
          <td class="text-sm font-medium text-slate-800">{{ movement.chemical }}</td>
          <td class="text-sm text-slate-600">{{ movement.batchNo }}</td>
          <td>
            <app-portal-badge [tone]="movementTypeTone(movement.movementType)">
              {{ movement.movementType }}
            </app-portal-badge>
          </td>
          <td class="text-sm text-slate-700">{{ movement.quantity }}</td>
          <td class="text-sm text-slate-700">{{ movement.unit }}</td>
          <td class="max-w-44 whitespace-normal text-sm leading-5 text-slate-600">{{ movement.location }}</td>
          <td class="text-sm text-slate-600">{{ movement.handledBy }}</td>
          <td class="text-sm text-slate-600">{{ movement.date }}</td>
          <td class="max-w-44 whitespace-normal text-sm leading-5 text-slate-600">{{ movement.remarks }}</td>
          <td class="text-center">
            <app-portal-inline-actions>
              <app-portal-button size="icon" variant="ghost" icon="pi-pencil" ariaLabel="Edit movement" title="Edit" />

              <app-portal-button size="icon" variant="ghost-danger" icon="pi-trash" ariaLabel="Delete movement" title="Delete" />
            </app-portal-inline-actions>
          </td>
        </tr>
      </ng-template>

  </app-portal-data-table>
</app-portal-page-content>
