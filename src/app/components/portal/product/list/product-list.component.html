<app-portal-actions>
  <app-portal-button icon="pi-download">
    Export
  </app-portal-button>

  <app-portal-button variant="primary" icon="pi-plus" link="/products/new">
    Add Chemical
  </app-portal-button>
</app-portal-actions>

<app-portal-page-content>
  <app-portal-filter-bar layout="chemical-list">
      <app-portal-search-filter
        [value]="searchTerm()"
        placeholder="Search chemicals, code, or CAS no."
        (valueChange)="searchTerm.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedHazardClass()"
        [options]="hazardClassOptions"
        (valueChange)="selectedHazardClass.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedLocation()"
        [options]="locationOptions"
        (valueChange)="selectedLocation.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedStockStatus()"
        [options]="stockStatusOptions"
        (valueChange)="selectedStockStatus.set($event); first.set(0)"
      />

      <app-portal-select-filter
        [value]="selectedSdsStatus()"
        [options]="sdsStatusOptions"
        (valueChange)="selectedSdsStatus.set($event); first.set(0)"
      />

      <app-portal-button icon="pi-refresh" [full]="true" (buttonClick)="resetFilters()">
        Reset
      </app-portal-button>
  </app-portal-filter-bar>

  <app-portal-data-table [config]="tableConfig()">
      <ng-template portalDataTableBody let-chemical>
        <tr>
          <td>
            <div class="flex min-w-0 items-center gap-3">
              <span
                class="flex h-11 w-11 flex-none items-center justify-center rounded-md text-xs font-bold"
                [ngClass]="chemical.avatarClass"
                aria-hidden="true"
              >
                {{ chemical.avatar }}
              </span>
              <a
                [routerLink]="['/products', chemical.id]"
                class="block min-w-0 truncate text-sm font-semibold text-slate-900 transition-colors hover:text-blue-600"
                [title]="chemical.name"
              >
                {{ chemical.name }}
              </a>
            </div>
          </td>
          <td class="text-sm text-slate-600">{{ chemical.code }}</td>
          <td class="text-sm text-slate-600">{{ chemical.casNo }}</td>
          <td>
            <app-portal-badge [tone]="hazardClassTone(chemical.hazardClass)">
              {{ chemical.hazardClass }}
            </app-portal-badge>
          </td>
          <td class="text-sm text-slate-600">{{ chemical.location }}</td>
          <td class="text-sm font-semibold" [ngClass]="stockClass(chemical.stock)">
            {{ chemical.stock }}
          </td>
          <td class="text-sm text-slate-700">{{ chemical.unit }}</td>
          <td>
            <app-portal-badge [tone]="expiryStatusTone(chemical.expiryStatus)">
              {{ chemical.expiryStatus }}
            </app-portal-badge>
          </td>
          <td>
            <app-portal-badge [tone]="sdsStatusTone(chemical.sdsStatus)">
              {{ chemical.sdsStatus }}
            </app-portal-badge>
          </td>
          <td class="text-sm text-slate-600">{{ chemical.updatedAt }}</td>
          <td class="text-center">
            <app-portal-inline-actions>
              <app-portal-button
                size="icon"
                variant="ghost"
                icon="pi-pencil"
                [link]="['/products', chemical.id, 'edit']"
                ariaLabel="Edit chemical"
                title="Edit"
              />

              <app-portal-button
                size="icon"
                variant="ghost-danger"
                icon="pi-trash"
                ariaLabel="Delete chemical"
                title="Delete"
              />
            </app-portal-inline-actions>
          </td>
        </tr>
      </ng-template>

  </app-portal-data-table>
</app-portal-page-content>
