<app-page-header
  [title]="isEditing() ? 'Edit Product' : 'Add Product'"
  [showButton]="false"
/>

@if (loading()) {
  <app-loading />
} @else {
  <div class="max-w-2xl">
    <app-portal-page-content [padded]="true">
      @if (errorMessage) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-sm text-red-700">{{ errorMessage }}</p>
        </div>
      }

      <form (ngSubmit)="save()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
            <input type="text" [(ngModel)]="product.name" name="name" required
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea [(ngModel)]="product.description" name="description" rows="3"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Price (RM)</label>
            <input type="number" [(ngModel)]="product.price" name="price" step="0.01" min="0"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
            <input type="number" [(ngModel)]="product.quantity" name="quantity" min="0"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
            <input type="text" [(ngModel)]="product.sku" name="sku"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
            <input type="text" [(ngModel)]="product.category" name="category"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Low Stock Alert</label>
            <input type="number" [(ngModel)]="product.low_stock_threshold" name="low_stock_threshold" min="1"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm" />
          </div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-100 flex gap-3">
          <button type="submit" [disabled]="saving()"
            class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors shadow-sm">
            @if (saving()) {
              <span class="inline-flex items-center gap-2">
                <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                Saving...
              </span>
            } @else {
              {{ isEditing() ? 'Update Product' : 'Create Product' }}
            }
          </button>
          <button type="button" (click)="cancel()"
            class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
            Cancel
          </button>
        </div>
      </form>
    </app-portal-page-content>
  </div>
}
