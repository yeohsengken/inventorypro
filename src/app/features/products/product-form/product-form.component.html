<div>
  <div class="mb-6">
    <h2 class="text-2xl font-semibold text-gray-800">
      {{ isEditing ? 'Edit Product' : 'Add Product' }}
    </h2>
  </div>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Loading...</div>

  <div *ngIf="!loading" class="bg-white rounded-lg shadow p-6 max-w-2xl">
    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="save()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <label class="block text-gray-700 text-sm font-medium mb-1">Product Name *</label>
          <input type="text" [(ngModel)]="product.name" name="name" required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-gray-700 text-sm font-medium mb-1">Description</label>
          <textarea [(ngModel)]="product.description" name="description" rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-medium mb-1">Price (RM)</label>
          <input type="number" [(ngModel)]="product.price" name="price" step="0.01" min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-medium mb-1">Quantity</label>
          <input type="number" [(ngModel)]="product.quantity" name="quantity" min="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-medium mb-1">SKU (optional)</label>
          <input type="text" [(ngModel)]="product.sku" name="sku"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-medium mb-1">Category (optional)</label>
          <input type="text" [(ngModel)]="product.category" name="category"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-gray-700 text-sm font-medium mb-1">Low Stock Alert When Below</label>
          <input type="number" [(ngModel)]="product.low_stock_threshold" name="low_stock_threshold" min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <div class="mt-6 flex gap-3">
        <button type="submit" [disabled]="saving"
          class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 disabled:opacity-50">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" (click)="cancel()"
          class="bg-gray-200 text-gray-700 px-6 py-2 rounded-md hover:bg-gray-300">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
