<div class="min-h-screen bg-gray-100">
  <!-- Top bar -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">InventoryPro</h1>
      <div class="flex items-center gap-4">
        <span class="text-gray-600 text-sm">{{ userEmail }}</span>
        <button
          (click)="logout()"
          class="bg-red-500 text-white px-4 py-2 rounded-md text-sm hover:bg-red-600"
        >
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-4">Dashboard</h2>
      <p class="text-gray-600">Welcome to InventoryPro! Your dashboard will show inventory stats and quick actions here soon.</p>
    </div>
  </main>
</div>
