<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
  <div class="text-center mb-8">
    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">InventoryPro</h1>
    <p class="text-gray-500 mt-1 text-sm">Sign in to your account</p>
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="login()" class="space-y-4">
    <div>
      <label class="block text-gray-700 text-sm font-medium mb-1.5">Email</label>
      <input type="email" [(ngModel)]="email" name="email" required
        class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
        placeholder="you@company.com" />
    </div>

    <div>
      <label class="block text-gray-700 text-sm font-medium mb-1.5">Password</label>
      <input type="password" [(ngModel)]="password" name="password" required
        class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
        placeholder="Your password" />
    </div>

    <button type="submit" [disabled]="loading"
      class="w-full bg-blue-600 text-white py-2.5 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 font-medium text-sm transition-colors mt-2">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <p class="text-center text-gray-500 text-sm mt-6">
    Don't have an account?
    <a routerLink="/register" class="text-blue-600 hover:underline font-medium">Sign up</a>
  </p>
</div>
